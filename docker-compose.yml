services:
  mongodb:
    image: mongo:7.0
    container_name: sentir-mais-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: sentir-mais-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"

  classifier:
    image: ${CLASSIFIER_IMAGE:-ghcr.io/ravilock/sentir-mais-classifier:latest-gpu}
    container_name: sentir-mais-classifier
    restart: unless-stopped
    # gpus: all
    environment:
      HOST: 0.0.0.0
      PORT: 8010
      API_KEY: ${CLASSIFIER_API_KEY:-sentir-mais-local-classifier-key}
      MODEL_NAME: ${CLASSIFIER_MODEL_NAME:-MoritzLaurer/mDeBERTa-v3-base-mnli-xnli}
      DEFAULT_LABELS: ${CLASSIFIER_DEFAULT_LABELS:-happy,sad,stressed,angry,doubtful,anxious,relaxed,tense}
      HYPOTHESIS_TEMPLATE: ${CLASSIFIER_HYPOTHESIS_TEMPLATE:-This text expresses {}.}
      TRUST_REMOTE_CODE: ${CLASSIFIER_TRUST_REMOTE_CODE:-false}
      MODEL_CACHE_DIR: ${CLASSIFIER_MODEL_CACHE_DIR:-/models}
      MODEL_DEVICE: ${CLASSIFIER_MODEL_DEVICE}
    ports:
      - "8010:8010"
    volumes:
      - classifier_models:/models

  prompter:
    image: ${PROMPTER_IMAGE:-ghcr.io/ravilock/sentir-mais-prompter:latest}
    container_name: sentir-mais-prompter
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8020
      API_KEY: ${PROMPTER_API_KEY:-sentir-mais-local-prompter-key}
      LLM_PROVIDER: ${PROMPTER_LLM_PROVIDER:-openrouter}
      LLM_BASE_URL: ${PROMPTER_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_API_KEY: ${PROMPTER_LLM_API_KEY:-}
      DEFAULT_MODEL: ${PROMPTER_DEFAULT_MODEL:-google/gemini-2.5-flash-lite}
      REQUEST_TIMEOUT_SECONDS: ${PROMPTER_TIMEOUT_SECONDS:-30}
      APP_URL: ${PROMPTER_APP_URL:-http://localhost:8001}
      APP_TITLE: ${PROMPTER_APP_TITLE:-sentir-mais-prompter}
      ALLOW_MODEL_OVERRIDE: ${PROMPTER_ALLOW_MODEL_OVERRIDE:-true}
    ports:
      - "8020:8020"

volumes:
  mongodb_data:
  classifier_models:
